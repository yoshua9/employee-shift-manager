services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: turnos_root
      MARIADB_DATABASE: employee_manager
      MARIADB_USER: turnos_user
      MARIADB_PASSWORD: turnos_pass
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - dbdata:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: employee_manager
      DB_USER: turnos_user
      DB_PASS: turnos_pass
    volumes:
      - ./:/var/www/html
    ports:
      - "8080:80"

volumes:
  dbdata:
